kind = "web"
previewPath = "/"
title = "AI-Therapist"
version = "1.0.0"
id = "artifacts/ai-therapist"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18084

[services.development]
run = "pnpm --filter @workspace/ai-therapist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-therapist", "run", "build" ]
serve = "static"
publicDir = "artifacts/ai-therapist/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18084"
BASE_PATH = "/"
